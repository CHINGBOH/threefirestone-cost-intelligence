version: '3.8'

# RAG Dashboard Microservices Architecture
# Phase 5: Deployment Orchestration
#
# Services:
#   - node-server:       Node.js API + XState orchestrator (3001)
#   - go-gateway:        Go API Gateway (8080)
#   - go-websocket:      Go WebSocket Gateway (8081)
#   - python-legacy:     Python FastAPI embedding/ingestion (8000)
#   - retrieval-service: Python FastAPI retrieval service (8002)
#   - postgres:          PostgreSQL for XState persistence
#   - redis:             Cache & session store
#   - qdrant:            Vector database
#   - elasticsearch:     Keyword/full-text search
#   - neo4j:             Knowledge graph

services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  postgres:
    build:
      context: ./infrastructure/docker
      dockerfile: Dockerfile.postgres
    image: rag-postgres:16-zhparser
    container_name: rag-postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init:/docker-entrypoint-initdb.d:ro
    environment:
      POSTGRES_DB: rag_dashboard
      POSTGRES_USER: rag_user
      POSTGRES_PASSWORD: rag_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag_user -d rag_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - rag-network

  redis:
    image: redis:7.2-alpine
    container_name: rag-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - rag-network

  qdrant:
    image: qdrant/qdrant:v1.8.0
    container_name: rag-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - rag-network

  # ---------------------------------------------------------------------------
  # Application Services
  # ---------------------------------------------------------------------------
  python-legacy:
    build:
      context: ./src/backend/python-legacy
      dockerfile: Dockerfile
    container_name: rag-python-legacy
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - DATABASE_URL=postgresql://rag_user:rag_password@postgres:5432/rag_dashboard
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=rag_dashboard
      - POSTGRES_USER=rag_user
      - POSTGRES_PASSWORD=rag_password
      - TEI_URL=http://tei:8000
      - EMBEDDING_BACKEND=tei
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - rag-network

  retrieval-service:
    build:
      context: ./src/backend/retrieval-service
      dockerfile: Dockerfile
    container_name: rag-retrieval-service
    ports:
      - "8002:8002"
    environment:
      - PORT=8002
      - DATABASE_URL=postgresql://rag_user:rag_password@postgres:5432/rag_dashboard
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=rag_dashboard
      - POSTGRES_USER=rag_user
      - POSTGRES_PASSWORD=rag_password
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - rag-network

  node-server:
    build:
      context: ./src/backend/server
      dockerfile: Dockerfile
    container_name: rag-node-server
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DATABASE_URL=postgresql://rag_user:rag_password@postgres:5432/rag_dashboard
      - REDIS_URL=redis://redis:6379/0
      - PYTHON_API_URL=http://python-legacy:8000
      - RETRIEVAL_API_URL=http://retrieval-service:8002
      - WS_GATEWAY_URL=http://go-websocket:8081/broadcast
      - AUTH_SECRET=${AUTH_SECRET:-change-me-in-production}
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      python-legacy:
        condition: service_started
      retrieval-service:
        condition: service_started
    restart: unless-stopped
    networks:
      - rag-network

  go-gateway:
    build:
      context: ./src/backend/go-services
      dockerfile: Dockerfile.gateway
    container_name: rag-go-gateway
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - NODEJS_URL=http://node-server:3001
      - PYTHON_URL=http://python-legacy:8000
      - OCR_URL=http://python-legacy:8000
      - RETRIEVAL_URL=http://retrieval-service:8002
      - LLM_URL=http://python-legacy:8000
      - WS_GATEWAY_URL=http://go-websocket:8081
    depends_on:
      node-server:
        condition: service_started
      python-legacy:
        condition: service_started
      retrieval-service:
        condition: service_started
    restart: unless-stopped
    networks:
      - rag-network

  go-websocket:
    build:
      context: ./src/backend/go-services
      dockerfile: Dockerfile.websocket
    container_name: rag-go-websocket
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
    restart: unless-stopped
    networks:
      - rag-network

  # ---------------------------------------------------------------------------
  # Embedding Services
  # ---------------------------------------------------------------------------
  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:1.5
    container_name: rag-tei
    ports:
      - "8003:80"
    volumes:
      - ./models:/data
    environment:
      - MODEL_ID=BAAI/bge-m3
      - PORT=80
      - MAX_BATCH_TOKENS=16384
      - MAX_CLIENT_BATCH_SIZE=64
    command: >
      --model-id BAAI/bge-m3
      --revision main
      --port 80
      --max-batch-tokens 16384
      --max-client-batch-size 64
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - rag-network

networks:
  rag-network:
    driver: bridge

volumes:
  postgres_data:
  qdrant_storage:
