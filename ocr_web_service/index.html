<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF OCR 在线处理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 800px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f2ff;
            transform: translateY(-2px);
        }

        .upload-area.dragover {
            border-color: #764ba2;
            background: #e8ebff;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 4em;
            color: #667eea;
            margin-bottom: 20px;
        }

        .upload-text {
            color: #333;
            font-size: 1.2em;
            margin-bottom: 10px;
        }

        .upload-hint {
            color: #999;
            font-size: 0.9em;
        }

        .file-input {
            display: none;
        }

        .progress-container {
            margin-top: 30px;
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .status-text {
            text-align: center;
            color: #666;
            font-size: 1.1em;
        }

        .result-container {
            margin-top: 30px;
            display: none;
        }

        .result-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .result-header h2 {
            font-size: 1.5em;
            margin-bottom: 10px;
        }

        .result-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .info-item {
            background: #f8f9ff;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .info-label {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .info-value {
            color: #333;
            font-size: 1.1em;
            font-weight: bold;
        }

        .download-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .download-btn {
            flex: 1;
            min-width: 200px;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            text-align: center;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .download-btn.json {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .download-btn.text {
            background: linear-gradient(135deg, #ee0979 0%, #ff6a00 100%);
        }

        .new-upload-btn {
            margin-top: 20px;
            padding: 15px 30px;
            border: 2px solid #667eea;
            border-radius: 10px;
            background: transparent;
            color: #667eea;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        .new-upload-btn:hover {
            background: #667eea;
            color: white;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            border-left: 4px solid #c33;
            display: none;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .feature-item {
            text-align: center;
            padding: 20px;
            background: #f8f9ff;
            border-radius: 10px;
            border: 2px solid #e8ebff;
            transition: all 0.3s ease;
        }

        .feature-item:hover {
            border-color: #667eea;
            transform: translateY(-5px);
        }

        .feature-icon {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .feature-title {
            color: #333;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .feature-desc {
            color: #666;
            font-size: 0.9em;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .header h1 {
                font-size: 2em;
            }

            .upload-area {
                padding: 30px 20px;
            }

            .download-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📄 PDF OCR 在线处理</h1>
            <p>上传PDF文件，一键提取文字和表格内容</p>
        </div>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <div class="upload-text">点击或拖拽上传PDF文件</div>
            <div class="upload-hint">支持最大500MB的PDF文件</div>
            <input type="file" class="file-input" id="fileInput" accept=".pdf">
        </div>

        <div class="progress-container" id="progressContainer">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill">0%</div>
            </div>
            <div class="status-text" id="statusText">正在处理...</div>
        </div>

        <div class="result-container" id="resultContainer">
            <div class="result-header">
                <h2>✅ 处理完成</h2>
                <p>您的PDF文件已成功处理</p>
            </div>

            <div class="result-info">
                <div class="info-item">
                    <div class="info-label">文件名</div>
                    <div class="info-value" id="fileName">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">总页数</div>
                    <div class="info-value" id="totalPages">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">处理时间</div>
                    <div class="info-value" id="processingTime">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">文本长度</div>
                    <div class="info-value" id="textLength">-</div>
                </div>
            </div>

            <div class="download-buttons">
                <a href="#" class="download-btn json" id="downloadJson">📥 下载JSON格式</a>
                <a href="#" class="download-btn text" id="downloadText">📥 下载文本格式</a>
            </div>

            <button class="new-upload-btn" id="newUploadBtn">🔄 处理新文件</button>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="features">
            <div class="feature-item">
                <div class="feature-icon">⚡</div>
                <div class="feature-title">快速处理</div>
                <div class="feature-desc">智能识别，快速提取</div>
            </div>
            <div class="feature-item">
                <div class="feature-icon">📊</div>
                <div class="feature-title">表格识别</div>
                <div class="feature-desc">精确提取表格数据</div>
            </div>
            <div class="feature-item">
                <div class="feature-icon">🎯</div>
                <div class="feature-title">高精度</div>
                <div class="feature-desc">99%+识别准确率</div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api/ocr';
        let currentTaskId = null;
        let statusCheckInterval = null;

        // DOM元素
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const statusText = document.getElementById('statusText');
        const resultContainer = document.getElementById('resultContainer');
        const errorMessage = document.getElementById('errorMessage');

        // 上传区域点击事件
        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });

        // 文件选择事件
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                uploadFile(e.target.files[0]);
            }
        });

        // 拖拽事件
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            
            if (e.dataTransfer.files.length > 0) {
                const file = e.dataTransfer.files[0];
                if (file.type === 'application/pdf') {
                    uploadFile(file);
                } else {
                    showError('请上传PDF文件');
                }
            }
        });

        // 上传文件
        async function uploadFile(file) {
            const formData = new FormData();
            formData.append('file', file);

            try {
                uploadArea.style.display = 'none';
                progressContainer.style.display = 'block';
                errorMessage.style.display = 'none';

                const response = await fetch(`${API_BASE}/upload`, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error('上传失败');
                }

                const data = await response.json();
                currentTaskId = data.task_id;

                // 开始检查状态
                checkTaskStatus();

            } catch (error) {
                showError('上传失败: ' + error.message);
                resetUpload();
            }
        }

        // 检查任务状态
        async function checkTaskStatus() {
            try {
                const response = await fetch(`${API_BASE}/status/${currentTaskId}`);
                
                if (!response.ok) {
                    throw new Error('获取状态失败');
                }

                const data = await response.json();

                // 更新进度
                progressFill.style.width = `${data.progress}%`;
                progressFill.textContent = `${data.progress}%`;

                if (data.status === 'pending') {
                    statusText.textContent = '等待处理...';
                } else if (data.status === 'processing') {
                    statusText.textContent = '正在处理中...';
                } else if (data.status === 'completed') {
                    statusText.textContent = '处理完成!';
                    showResult();
                    return;
                } else if (data.status === 'failed') {
                    throw new Error(data.error || '处理失败');
                }

                // 继续检查
                statusCheckInterval = setTimeout(checkTaskStatus, 2000);

            } catch (error) {
                showError('处理失败: ' + error.message);
                resetUpload();
            }
        }

        // 显示结果
        async function showResult() {
            try {
                const response = await fetch(`${API_BASE}/result/${currentTaskId}`);
                
                if (!response.ok) {
                    throw new Error('获取结果失败');
                }

                const result = await response.json();

                // 更新结果信息
                document.getElementById('fileName').textContent = result.file_name;
                document.getElementById('totalPages').textContent = result.total_pages + ' 页';
                document.getElementById('processingTime').textContent = Math.round(result.processing_time) + ' 秒';
                document.getElementById('textLength').textContent = result.full_text.length.toLocaleString() + ' 字';

                // 设置下载链接
                document.getElementById('downloadJson').href = result.download_urls.json;
                document.getElementById('downloadText').href = result.download_urls.text;

                // 显示结果容器
                progressContainer.style.display = 'none';
                resultContainer.style.display = 'block';

            } catch (error) {
                showError('获取结果失败: ' + error.message);
                resetUpload();
            }
        }

        // 显示错误
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
        }

        // 重置上传
        function resetUpload() {
            if (statusCheckInterval) {
                clearTimeout(statusCheckInterval);
                statusCheckInterval = null;
            }
            
            uploadArea.style.display = 'block';
            progressContainer.style.display = 'none';
            resultContainer.style.display = 'none';
            fileInput.value = '';
            currentTaskId = null;
        }

        // 新上传按钮
        document.getElementById('newUploadBtn').addEventListener('click', resetUpload);
    </script>
</body>
</html>
